<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CISダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#f5f6fa;
  --panel:#ffffff;
  --panel2:#f8f9fc;
  --border:#e8eaed;
  --text:#1a1a2e;
  --text2:#5f6368;
  --text3:#9aa0a6;
  --pink:#e91e8c;
  --pink-dim:#f48cbc;
  --blue:#1565c0;
  --blue-dim:#5c8fd6;
  --green:#0a8754;
  --orange:#e37400;
  --red:#c5221f;
  --nav-w:200px;
  --hdr-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;display:flex;flex-direction:column;min-height:100vh}

/* ── Header ── */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-logo{font-size:15px;font-weight:700;letter-spacing:.5px;color:var(--text)}
.hdr-tag{font-size:10px;background:var(--pink);color:#fff;padding:2px 8px;border-radius:4px;font-weight:700;letter-spacing:.5px}
.hdr-right{font-size:11px;color:var(--text2);text-align:right;line-height:1.7;font-family:"DM Mono",monospace}

/* ── Layout ── */
.layout{display:flex;margin-top:var(--hdr-h);min-height:calc(100vh - var(--hdr-h))}

/* ── Side Nav ── */
.nav{width:var(--nav-w);background:#fff;border-right:1px solid var(--border);padding:16px 0;position:fixed;top:var(--hdr-h);bottom:0;overflow-y:auto}
.nav-section{font-size:10px;color:var(--text3);letter-spacing:1.5px;padding:12px 18px 6px;font-weight:700;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13px;color:var(--text2);cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text);background:#f8f9fc}
.nav-item.on{color:var(--pink);background:#fff5fa;border-left-color:var(--pink);font-weight:700}
.nav-icon{font-size:14px;width:18px;text-align:center}

/* ── Main ── */
.main{margin-left:var(--nav-w);flex:1;padding:24px;overflow-x:hidden}

/* ── Filters ── */
.flt-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;padding:12px 16px;background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.flt-bar label{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.5px}
.flt-bar select{font-size:12px;padding:6px 12px;background:var(--panel2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-family:"Noto Sans JP",sans-serif}
.flt-bar select:focus{outline:none;border-color:var(--pink)}

/* ── Hero: Action Recommend ── */
.hero{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px 24px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pink),var(--blue))}
.hero-top{display:flex;align-items:center;gap:20px;margin-bottom:16px}
.hero-gauge{position:relative;width:88px;height:88px;flex-shrink:0}
.hero-gauge svg{width:88px;height:88px}
.hero-gauge-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hero-gauge-num{font-size:22px;font-weight:700;font-family:"DM Mono",monospace}
.hero-gauge-unit{font-size:10px;color:var(--text2)}
.hero-info{flex:1}
.hero-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.hero-badge{font-size:10px;padding:2px 10px;border-radius:20px;background:#fce4f3;color:var(--pink);font-weight:700;border:1px solid #f48cbc}
.hero-desc{font-size:12px;color:var(--text2)}
.hero-periods{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.period-card{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;transition:all .2s}
.period-card.cur{border-color:var(--pink);background:#fff5fa;box-shadow:0 2px 8px rgba(233,30,140,.12)}
.period-label{font-size:10px;color:var(--text2);margin-bottom:4px}
.period-val{font-size:20px;font-weight:700;font-family:"DM Mono",monospace}
.period-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* ── KPI Row ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pink),var(--blue));opacity:.6}
.kpi-l{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500;letter-spacing:.3px}
.kpi-v{font-size:24px;font-weight:700;font-family:"DM Mono",monospace;color:var(--text)}
.kpi-u{font-size:11px;color:var(--text3);margin-top:4px}

/* ── Section Headers ── */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-num{font-size:11px;font-weight:700;color:var(--pink);font-family:"DM Mono",monospace;background:#fce4f3;border:1px solid #f48cbc;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.sec-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.3px}

/* ── Cards ── */
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}

/* ── Grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}

/* ── Table ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;font-weight:700;font-size:10px;color:var(--text3);padding:6px 10px;border-bottom:1px solid var(--border);letter-spacing:.8px;text-transform:uppercase}
.tbl td{padding:8px 10px;border-bottom:1px solid #1e1e1e;color:var(--text)}
.tbl tr:hover td{background:rgba(255,255,255,.02)}

/* ── Bars ── */
.br{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.br-l{font-size:12px;min-width:130px;color:var(--text2)}
.br-bg{flex:1;height:10px;background:#eef2f7;border-radius:5px;overflow:hidden}
.br-f{height:100%;border-radius:5px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.br-n{font-size:11px;color:var(--text2);min-width:44px;text-align:right;font-family:"DM Mono",monospace}

/* ── Score box ── */
.sbox{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.sbox .sl{font-size:10px;color:var(--text2);margin-bottom:4px}
.sbox .sv{font-size:14px;font-weight:700;color:var(--text);font-family:"DM Mono",monospace}
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}

/* ── Detail cards ── */
.dg3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.dc{border-radius:8px;padding:14px;text-align:center;border:1px solid var(--border)}
.dc .dl{font-size:11px;color:var(--text2);margin-bottom:6px}
.dc .dv{font-size:28px;font-weight:700;font-family:"DM Mono",monospace}

/* ── Ladder ── */
.ldr{overflow-x:auto;margin-bottom:12px}
.ldr table{border-collapse:collapse;width:100%;font-size:11px}
.ldr th,.ldr td{padding:5px 10px;text-align:center;border:1px solid var(--border);font-family:"DM Mono",monospace}
.ldr th{background:var(--panel2);color:var(--text2);font-weight:600}
.ldr .hl{background:var(--pink);color:#fff;font-weight:700}
.lr{margin-top:10px;padding:12px;background:#e8f0fe;border:1px solid #c5d8fd;border-radius:8px;font-size:12px;color:var(--text2)}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.b-ok{background:#e6f4ea;color:var(--green);border:1px solid #a8d5b5}
.b-ng{background:#fce8e6;color:var(--red);border:1px solid #f5c6c4}
.b-w{background:#fef3e2;color:var(--orange);border:1px solid #fcd99b}
.b-rec{background:#e8f0fe;color:var(--blue);border:1px solid #c5d8fd}
.b-old{background:#fce4f3;color:var(--pink);border:1px solid #f48cbc}

/* ── MTG cards ── */
.mtg-wk{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-bottom:14px}
.mtg-card{border-radius:8px;padding:12px;border:1px solid var(--border);background:var(--panel2)}
.mtg-card.rec{border-color:#c5d8fd;background:#e8f0fe}
.mtg-card.old{border-color:#f48cbc;background:#fce4f3}
.mtg-card.none{opacity:.5}
.mtg-wn{font-size:10px;color:var(--text3);margin-bottom:4px}
.mtg-who{font-size:13px;font-weight:700;color:var(--text)}
.mtg-tp{font-size:10px;margin-top:4px}

/* ── Delta ── */
.delta{font-size:10px;margin-left:2px;font-weight:700;font-family:"DM Mono",monospace}
.delta.up{color:var(--red)}.delta.dn{color:var(--green)}

/* ── Panel toggle ── */
.panel{display:none}.panel.on{display:block}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f0f0f0}
::-webkit-scrollbar-thumb{background:#d0d0d0;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#aaa}

@media(max-width:768px){
  :root{--nav-w:0px}
  .nav{display:none}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .hero-periods{grid-template-columns:repeat(2,1fr)}
  .g2,.g3{grid-template-columns:1fr}
  .dg3,.sg4{grid-template-columns:1fr}
}
</style>
<body>
<header class="hdr">
  <div class="hdr-left">
    <span class="hdr-logo">CISダッシュボード</span>
    <span class="hdr-tag">LIVE</span>
  </div>
  <div class="hdr-right" id="hdr-m">読込中...</div>
</header>
<div class="layout">
<nav class="nav">
  <div class="nav-section">メイン</div>
  <div class="nav-item on" onclick="swTab('ov')" id="ni-ov"><span class="nav-icon">▦</span>グループ概況</div>
  <div class="nav-item" onclick="swTab('mg')" id="ni-mg"><span class="nav-icon">◈</span>管轄概況</div>
  <div class="nav-section">分析</div>
  <div class="nav-item" onclick="swTab('np')" id="ni-np"><span class="nav-icon">◎</span>NPS得点一覧</div>
  <div class="nav-item" onclick="swTab('is')" id="ni-is"><span class="nav-icon">◐</span>指摘改善</div>
  <div class="nav-item" onclick="swTab('mt')" id="ni-mt"><span class="nav-icon">▷</span>MTG実施状況</div>
</nav>
<main class="main">
  <div class="flt-bar">
    <label>GROUP</label>
    <select id="sg" onchange="onG()"><option value="all">すべてのグループ</option></select>
    <label>MG</label>
    <select id="sm" onchange="onM()"><option value="all">すべてのMG</option></select>
    <label>STORE</label>
    <select id="ss" onchange="onS()"><option value="all">すべて（一覧表示）</option></select>
  </div>
  <div class="hero" id="hero"></div>
  <div class="kpi-row" id="kpis"></div>
  <div id="detail" style="display:none"></div>
  <div id="listv">
    <div class="panel on" id="p-ov"></div>
    <div class="panel" id="p-mg"></div>
    <div class="panel" id="p-np"></div>
    <div class="panel" id="p-is"></div>
    <div class="panel" id="p-mt"></div>
  </div>
</main>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
Chart.defaults.color='#5f6368';
Chart.defaults.borderColor='#e8eaed';

const GR=["東京第1G","東京第2G","東京第3G","神奈川G","埼玉G","千葉G","東日本広域G","東海第1G","東海第2G","関西北陸G","中四国九州G"];
const CF=["スタッフの身だしなみ","スタッフの言葉使い","スタッフの笑顔","応対の丁寧さ","説明のわかりやすさ","自分にあった提案","強引な提案販売","不明点確認","手続きのスムーズさ","接客時間の長さ","待ち時間の長さ","店舗の清潔さ","事前内容の引継","その他"];
const CL=["#1565c0","#2e7d32","#d84315","#6a1b9a","#f57f17","#c62828","#00695c","#0d47a1","#33691e","#b71c1c","#4527a0","#795548","#01579b","#757575"];
const LS=[70,67.5,65,62.5,60,57.5,55,52.5,50,47.5,45],LR=[.30,.275,.25,.225,.20];
const LP=[[200,190,180,170,160],[190,180,170,160,150],[180,170,160,60,50],[170,160,150,50,40],[160,150,140,40,30],[60,50,40,30,20],[50,40,30,20,10],[40,30,20,10,0],[30,20,10,0,0],[20,10,0,0,0],[10,0,0,0,0]];
const PD=[{l:'第1期',r:'1日〜7日',mn:1,mx:7},{l:'第2期',r:'8日〜14日',mn:8,mx:14},{l:'第3期',r:'15日〜21日',mn:15,mx:21},{l:'第4期',r:'22日〜末日',mn:22,mx:31}];

let NPS=[],ISS=[],IP=[],MGM=[],GRM=[],STM=[],NMG=[],NM={},ch={},fG='all',fM='all',fS='all',ND='';

function cp(){const d=new Date().getDate();return PD.findIndex(p=>d>=p.mn&&d<=p.mx);}

async function init(){
  try{
    const [r1,r2,r3,r4,r5,r6,r7,r8]=await Promise.all([
      fetch('./data/nps_store.json'),fetch('./data/issues.json'),fetch('./data/mg_mtg.json'),fetch('./data/grp_mtg.json'),
      fetch('./data/store_mtg.json'),fetch('./data/name_map.json'),fetch('./data/nps_mg.json'),fetch('./data/issues_prev.json')
    ]);
    NPS=await r1.json();ISS=await r2.json();MGM=await r3.json();GRM=await r4.json();
    STM=await r5.json();NM=await r6.json();NMG=await r7.json();IP=await r8.json();
    NPS.forEach(s=>{if(NM[s.n])s.n=NM[s.n];});
    NMG.forEach(s=>{if(NM[s.n])s.n=NM[s.n];});
    ND='11';
    document.getElementById('hdr-m').innerHTML='NPS: '+NPS.length+'店舗（'+ND+'日時点）<br>指摘改善: '+ISS.length+'店舗（毎朝更新）<br>MTG: '+STM.length+'店舗';
    setupFilters();bH();bK();buildOv();
  }catch(e){document.getElementById('hdr-m').textContent='エラー: '+e.message;console.error(e);}
}

function setupFilters(){const sg=document.getElementById('sg');GR.forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g;sg.appendChild(o);});rMG();rST();}
function rMG(){const sm=document.getElementById('sm');sm.innerHTML='<option value="all">すべてのMG</option>';const ms=new Set();STM.forEach(s=>{if(s.mg&&(fG==='all'||s.g===fG))ms.add(s.mg);});[...ms].sort((a,b)=>a.localeCompare(b,'ja')).forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m+'MG';sm.appendChild(o);});}
function rST(){const ss=document.getElementById('ss');ss.innerHTML='<option value="all">すべて（一覧表示）</option>';const nm=new Map();NPS.forEach(s=>{if((fG==='all'||s.g===fG)&&(fM==='all'||gMG(s.n)===fM)){if(!nm.has(s.n))nm.set(s.n,{n:true,i:false});}});ISS.forEach(s=>{if(fG==='all'||s.g===fG){if(nm.has(s.n))nm.get(s.n).i=true;else if(fM==='all'||gMG(s.n)===fM)nm.set(s.n,{n:false,i:true});}});[...nm.entries()].sort((a,b)=>a[0].localeCompare(b[0],'ja')).forEach(([n,d])=>{const o=document.createElement('option');o.value=n;const t=[];if(d.n)t.push('NPS');if(d.i)t.push('指摘');o.textContent=n+'（'+t.join('・')+'）';ss.appendChild(o);});}
function gMG(n){const s=STM.find(x=>x.n===n);return s?s.mg:'';}
function onG(){fG=document.getElementById('sg').value;fM='all';fS='all';rMG();rST();bH();bK();const a=document.querySelector('.panel.on');if(a)swTab(a.id.replace('p-',''));document.getElementById('detail').style.display='none';document.getElementById('listv').style.display='';}
function onM(){fM=document.getElementById('sm').value;fS='all';rST();bH();bK();const a=document.querySelector('.panel.on');if(a)swTab(a.id.replace('p-',''));document.getElementById('detail').style.display='none';document.getElementById('listv').style.display='';}
function onS(){fS=document.getElementById('ss').value;if(fS==='all'){document.getElementById('detail').style.display='none';document.getElementById('listv').style.display='';bH();bK();}else{document.getElementById('detail').style.display='';document.getElementById('listv').style.display='none';bH();bD();}}

function fNPS(){return NPS.filter(s=>(fG==='all'||s.g===fG)&&(fM==='all'||gMG(s.n)===fM));}
function fISS(){return ISS.filter(s=>fG==='all'||s.g===fG);}
function fIP(){return IP.filter(s=>fG==='all'||s.g===fG);}
function fSTM(){let r=fG==='all'?STM:STM.filter(s=>s.g===fG);if(fM!=='all')r=r.filter(s=>s.mg===fM);return r;}

// Period rates - show up to previous completed period as "total", current period separately
function pRates(storeName){
  const sts=storeName?STM.filter(s=>s.n===storeName):fSTM();
  const tot=sts.length||1;
  return PD.map(p=>{let rc=0,ol=0;sts.forEach(s=>{s.wk.forEach(w=>{if(!w.d)return;const dy=parseInt(w.d.split('-')[2]);if(dy>=p.mn&&dy<=p.mx){if(w.tp==='現行版')rc++;else ol++;}});});return{...p,rc,ol,tt:rc+ol,rate:rc+ol>0?Math.round(rc/(rc+ol)*100):0};});
}

function bH(){
  const isStore=fS!=='all';
  const pr=pRates(isStore?fS:null);
  const ci=cp();
  // Total rate = all completed periods (before current)
  let totalRec=0,totalOld=0;
  pr.forEach((p,i)=>{if(i<ci){totalRec+=p.rc;totalOld+=p.ol;}});
  const totalRate=totalRec+totalOld>0?Math.round(totalRec/(totalRec+totalOld)*100):0;
  const displayRate=ci>0?totalRate:(pr[0].rate);
  const col=displayRate>=80?'#2e7d32':displayRate>=50?'#1565c0':'#c62828';
  const circ=226.2;
  const periodLabel=ci>0?'〜第'+ci+'期累計':'第1期';
  let periods='';
  pr.forEach((p,i)=>{const ic=i===ci;const c=p.rate>=80?'#2e7d32':p.rate>=50?'#1565c0':'#c62828';const isCompleted=i<ci;
    periods+='<div class="hp'+(ic?' cur':'')+'"><div class="hp-label">'+p.l+'（'+p.r+'）'+(isCompleted?' ✓':'')+'</div><div class="hp-val" style="color:'+(p.tt>0?c:'#ccc')+'">'+p.rate+'%</div><div class="hp-sub">実施'+p.tt+'回（現行'+p.rc+'/旧'+p.ol+'）</div></div>';});
  const title=isStore?fS+'のアクションレコメンド利用率':'アクションレコメンド利用率';
  document.getElementById('hero').innerHTML='<div class="hero-top"><div class="hero-g"><svg viewBox="0 0 90 90"><circle cx="45" cy="45" r="36" fill="none" stroke="#e0e0e0" stroke-width="8"/><circle cx="45" cy="45" r="36" fill="none" stroke="'+col+'" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ*(1-displayRate/100)+'" transform="rotate(-90 45 45)"/></svg><div class="hero-gv"><span class="hero-gn" style="color:'+col+'">'+displayRate+'</span><span class="hero-gu">%</span></div></div><div class="hero-b"><div class="hero-bt">'+title+' <span class="hero-badge">'+periodLabel+'</span></div><div class="hero-bd">目標: <strong>100%</strong>　前週までの累計利用率（現在'+PD[ci].l+'進行中）</div></div></div><div class="hero-periods">'+periods+'</div>';
}

function bK(){
  const ns=fNPS();const is=fISS();const ip=fIP();
  const ap=ns.length?Math.round(ns.reduce((a,s)=>a+(s.pt||0),0)/ns.length):0;
  const asc=ns.length?Math.round(ns.reduce((a,s)=>a+(s.sc||0),0)/ns.length*10)/10:0;
  const ar=ns.length?Math.round(ns.reduce((a,s)=>a+(s.rr||0),0)/ns.length*1000)/10:0;
  const ti=is.reduce((a,s)=>a+s.iss,0),tr=is.reduce((a,s)=>a+s.resp,0),ir=tr>0?Math.round(ti/tr*1000)/10:0;
  const tip=ip.reduce((a,s)=>a+s.iss,0),trp=ip.reduce((a,s)=>a+s.resp,0),irp=trp>0?Math.round(tip/trp*1000)/10:0;
  const df=Math.round((ir-irp)*10)/10;const dh=df>0?'<span class="delta up">▲'+df+'</span>':df<0?'<span class="delta dn">▼'+Math.abs(df)+'</span>':'<span class="delta">→</span>';
  document.getElementById('kpis').innerHTML=kH('NPS得点（平均）',ap,ND+'日時点')+kH('NPSスコア（平均）',asc,'SY合算')+kH('回答率（平均）',ar+'%','SY合算')+'<div class="kpi"><div class="kpi-l">指摘改善率（当月）</div><div class="kpi-v">'+ir+'%</div><div class="kpi-u">'+ti+'件/'+tr+'回答 '+dh+'</div></div>';
}
function kH(l,v,u){return '<div class="kpi"><div class="kpi-l">'+l+'</div><div class="kpi-v">'+v+'</div><div class="kpi-u">'+u+'</div></div>';}

function swTab(id){['ov','mg','np','is','mt'].forEach(t=>{const e=document.getElementById('ni-'+t);if(e)e.classList.toggle('on',t===id);});document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));document.getElementById('p-'+id).classList.add('on');({ov:buildOv,mg:buildMg,np:buildNp,is:buildIs,mt:buildMt})[id]();}

function buildOv(){
  const gd=GR.map(g=>{const ns=NPS.filter(s=>s.g===g),is=ISS.filter(s=>s.g===g),ip=IP.filter(s=>s.g===g);
    const pt=ns.length?Math.round(ns.reduce((a,s)=>a+(s.pt||0),0)/ns.length):0;
    const sc=ns.length?Math.round(ns.reduce((a,s)=>a+(s.sc||0),0)/ns.length*10)/10:0;
    const ti=is.reduce((a,s)=>a+s.iss,0),tr=is.reduce((a,s)=>a+s.resp,0),ir=tr>0?Math.round(ti/tr*1000)/10:0;
    const tip=ip.reduce((a,s)=>a+s.iss,0),trp=ip.reduce((a,s)=>a+s.resp,0),irp=trp>0?Math.round(tip/trp*1000)/10:0;
    const df=Math.round((ir-irp)*10)/10;
    return{g,n:ns.length,pt,sc,ir,irp,df};});
  let h='<div class="card"><div class="ct">グループ別 NPS得点</div><div style="position:relative;height:240px"><canvas id="c1"></canvas></div></div>';
  h+='<div class="g2"><div class="card"><div class="ct">グループ別 NPSスコア</div><div style="position:relative;height:200px"><canvas id="c2"></canvas></div></div><div class="card"><div class="ct">グループ別 指摘改善率（当月 vs 前月）</div><div style="position:relative;height:200px"><canvas id="c3"></canvas></div></div></div>';
  h+='<div class="card"><div class="ct">グループ別サマリ</div><table class="tbl"><thead><tr><th>グループ</th><th>店舗数</th><th>NPS得点</th><th>スコア</th><th>指摘改善率</th><th>前月</th><th>増減</th></tr></thead><tbody>';
  gd.forEach(d=>{const dc=d.df>0?'delta up':d.df<0?'delta dn':'delta';const ds=d.df>0?'▲'+d.df:d.df<0?'▼'+Math.abs(d.df):'→';
    h+='<tr><td style="font-weight:600">'+d.g+'</td><td style="text-align:right">'+d.n+'</td><td style="text-align:right;font-weight:700;color:#1a237e">'+d.pt+'</td><td style="text-align:right">'+d.sc+'</td><td style="text-align:right">'+d.ir+'%</td><td style="text-align:right;color:#888">'+d.irp+'%</td><td style="text-align:right"><span class="'+dc+'">'+ds+'</span></td></tr>';});
  h+='</tbody></table></div>';document.getElementById('p-ov').innerHTML=h;
  dC('c1');ch.c1=new Chart(document.getElementById('c1'),{type:'bar',data:{labels:gd.map(d=>d.g.replace('G','')),datasets:[{data:gd.map(d=>d.pt),backgroundColor:'#283593',borderRadius:4,borderSkipped:false}]},options:bo({})});
  dC('c2');ch.c2=new Chart(document.getElementById('c2'),{type:'bar',data:{labels:gd.map(d=>d.g.replace('G','')),datasets:[{data:gd.map(d=>d.sc),backgroundColor:'#2e7d32',borderRadius:4,borderSkipped:false}]},options:bo({max:100})});
  dC('c3');ch.c3=new Chart(document.getElementById('c3'),{type:'bar',data:{labels:gd.map(d=>d.g.replace('G','')),datasets:[{label:'当月',data:gd.map(d=>d.ir),backgroundColor:'#c62828',borderRadius:4,borderSkipped:false},{label:'前月',data:gd.map(d=>d.irp),backgroundColor:'#ef9a9a',borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{ticks:{callback:v=>v+'%'}}}}});
}

function buildMg(){
  let ms=fG==='all'?MGM:MGM.filter(m=>STM.some(s=>s.mg===m.m&&(fG==='all'||s.g===fG)));
  if(fM!=='all')ms=ms.filter(m=>m.m===fM);
  const ci=cp();
  ms.forEach(m=>{const rc=m.rec.slice(0,ci).reduce((a,v)=>a+v,0);const ol=m.old.slice(0,ci).reduce((a,v)=>a+v,0);m.arRate=rc+ol>0?Math.round(rc/(rc+ol)*100):0;});
  const sr=[...ms].sort((a,b)=>b.arRate-a.arRate);
  let h='<div class="card"><div class="ct">管轄MG別 アクションレコメンド利用率</div><div style="position:relative;height:'+Math.max(220,sr.length*24)+'px"><canvas id="c4"></canvas></div></div>';
  h+='<div class="card"><div class="ct">管轄MG別サマリ</div><div style="max-height:500px;overflow-y:auto"><table class="tbl"><thead><tr><th>管轄MG</th><th>店舗数</th><th>利用率</th><th>現行版</th><th>旧版</th><th>W1</th><th>W2</th><th>W3</th><th>W4</th></tr></thead><tbody>';
  sr.forEach(m=>{const c=m.arRate>=80?'#2e7d32':m.arRate>=50?'#f57f17':'#c62828';const rt=m.rec.reduce((a,v)=>a+v,0),ot=m.old.reduce((a,v)=>a+v,0);h+='<tr><td style="font-weight:600">'+m.m+'MG</td><td style="text-align:right">'+m.t+'</td><td style="text-align:right;font-weight:700;color:'+c+'">'+m.rate+'%</td><td style="text-align:right"><span class="badge b-rec">'+rt+'</span></td><td style="text-align:right">'+(ot>0?'<span class="badge b-ng">'+ot+'</span>':'0')+'</td>';m.rec.forEach((v,i)=>{h+='<td style="text-align:center;font-size:11px">'+v+'/'+(v+m.old[i])+'</td>';});h+='</tr>';});
  h+='</tbody></table></div></div>';document.getElementById('p-mg').innerHTML=h;
  dC('c4');const s2=[...ms].sort((a,b)=>a.arRate-b.arRate);ch.c4=new Chart(document.getElementById('c4'),{type:'bar',data:{labels:s2.map(m=>m.m+'MG'),datasets:[{data:s2.map(m=>m.arRate),backgroundColor:s2.map(m=>m.arRate>=80?'#2e7d32':m.arRate>=50?'#f57f17':'#c62828'),borderRadius:4,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>v+'%'},max:100},y:{grid:{display:false},ticks:{font:{size:11}}}}}});
}

function buildNp(){
  const d=fNPS().slice().sort((a,b)=>(b.pt||0)-(a.pt||0));
  let h='<div class="card"><div class="ct">NPS得点ランキング（'+d.length+'店舗・'+ND+'日時点）</div><div style="max-height:500px;overflow-y:auto"><table class="tbl"><thead><tr>';
  ['#','グループ','店舗名','得点','スコア','回答率','高得点誘導','ログイン','FB','MTG','推進率'].forEach(c=>{h+='<th>'+c+'</th>';});h+='</tr></thead><tbody>';
  d.forEach((s,i)=>{const pc=s.pt>=150?'#2e7d32':s.pt>=50?'#f57f17':'#c62828';h+='<tr><td style="text-align:center;color:#888">'+(i+1)+'</td><td style="font-size:11px">'+s.g+'</td><td>'+s.n+'</td><td style="font-weight:700;color:'+pc+';text-align:right">'+s.pt+'</td><td style="text-align:right">'+s.sc+'</td><td style="text-align:right">'+(s.rr?Math.round(s.rr*1000)/10+'%':'-')+'</td><td style="text-align:right;color:'+(s.hr>=.05?'#c62828':'#2e7d32')+'">'+(s.hr!=null?Math.round(s.hr*1000)/10+'%':'-')+'</td><td style="text-align:center">'+(s.li>=1?'✓':Math.round((s.li||0)*100)+'%')+'</td><td style="text-align:center">'+(s.fb>=1?'✓':Math.round((s.fb||0)*100)+'%')+'</td><td style="text-align:center">'+(s.mt>=1?'✓':Math.round((s.mt||0)*100)+'%')+'</td></tr>';});
  h+='</tbody></table></div></div>';document.getElementById('p-np').innerHTML=h;
}

function buildIs(){
  const ds=fISS();const ct=CF.map((_,i)=>ds.reduce((a,s)=>a+(s.c[i]||0),0));const mx=Math.max(...ct,1);
  let h='<div class="card"><div class="ct">指摘改善カテゴリ別件数（当月）</div>';
  CF.forEach((c,i)=>{h+='<div class="br"><span class="br-l">'+c+'</span><div class="br-bg"><div class="br-f" style="width:'+Math.round(ct[i]/mx*100)+'%;background:'+CL[i]+'"></div></div><span class="br-n">'+ct[i]+'件</span></div>';});
  h+='</div>';
  // Group comparison: good/bad vs prev month
  const gd=GR.map(g=>{const is=ISS.filter(s=>s.g===g),ip=IP.filter(s=>s.g===g);
    const ti=is.reduce((a,s)=>a+s.iss,0),tr=is.reduce((a,s)=>a+s.resp,0),ir=tr>0?Math.round(ti/tr*1000)/10:0;
    const tip=ip.reduce((a,s)=>a+s.iss,0),trp=ip.reduce((a,s)=>a+s.resp,0),irp=trp>0?Math.round(tip/trp*1000)/10:0;
    return{g:g.replace('G',''),ir,irp,df:Math.round((ir-irp)*10)/10};});
  h+='<div class="card"><div class="ct">グループ別 指摘改善率 良化・悪化</div><div style="position:relative;height:220px"><canvas id="c5"></canvas></div></div>';
  document.getElementById('p-is').innerHTML=h;
  dC('c5');ch.c5=new Chart(document.getElementById('c5'),{type:'bar',data:{labels:gd.map(d=>d.g),datasets:[{label:'当月',data:gd.map(d=>d.ir),backgroundColor:'#283593',borderRadius:4,borderSkipped:false},{label:'前月',data:gd.map(d=>d.irp),backgroundColor:'#9fa8da',borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{ticks:{callback:v=>v+'%'}}}}});
}

function buildMt(){
  const sts_r=fSTM();const sts=[...sts_r].sort((a,b)=>{const ra=a.wk.length?a.wk.filter(w=>w.tp==='現行版').length/a.wk.length:0;const rb=b.wk.length?b.wk.filter(w=>w.tp==='現行版').length/b.wk.length:0;return rb-ra;});
  let h='<div class="card"><div class="ct">店舗別 MTG実施状況（実施者・版）</div><div style="max-height:600px;overflow-y:auto"><table class="tbl"><thead><tr><th>グループ</th><th>管轄MG</th><th>店舗名</th><th>現行版</th><th>旧版</th>';
  h+='<th>推進率</th>';for(let w=1;w<=5;w++)h+='<th>'+w+'回目</th>';h+='</tr></thead><tbody>';
  sts.forEach(s=>{const mr=s.wk.filter(w=>w.tp==='現行版').length;const mo=s.wk.filter(w=>w.tp!=='現行版').length;const mrt=mr+mo>0?Math.round(mr/(mr+mo)*100):null;const mrc=mrt===100?'#0a8754':mrt>=80?'#1565c0':mrt>=50?'#e37400':'#e91e8c';h+='<tr><td style="font-size:11px">'+s.g+'</td><td style="font-size:11px">'+s.mg+'MG</td><td>'+s.n+'</td><td style="font-size:11px">'+s.rec+'</td><td style="font-size:11px">'+s.old+'</td><td style="text-align:center;font-weight:700;color:'+mrc+'">'+(mrt===null?'-':mrt+'%')+'</td>';
    for(let w=1;w<=5;w++){const wk=s.wk.find(x=>x.w===w);if(wk){const ir=wk.tp==='現行版';h+='<td style="font-size:10px"><span class="badge '+(ir?'b-rec':'b-ng')+'">'+wk.tp+'</span><br><strong>'+wk.who+'</strong><br><span style="color:#999">'+wk.d+'</span></td>';}else h+='<td style="text-align:center;color:#ddd">—</td>';}h+='</tr>';});
  h+='</tbody></table></div></div>';document.getElementById('p-mt').innerHTML=h;
}

function bD(){
  const nps=NPS.find(s=>s.n===fS);const iss=ISS.find(s=>s.n===fS);const mtg=STM.find(s=>s.n===fS);const isp=IP.find(s=>s.n===fS);
  if(!nps&&!iss&&!mtg){document.getElementById('detail').innerHTML='<div class="card"><p style="color:#888">「'+fS+'」のデータが見つかりません</p></div>';return;}
  let h='';
  if(mtg){h+='<div class="card"><div class="ct">MTG実施状況 ─ '+fS+'（'+mtg.mg+'MG管轄）</div><div style="display:flex;gap:16px;margin-bottom:14px"><span>現行版: <strong style="color:#1565c0">'+mtg.rec+'</strong></span><span>旧版: <strong style="color:#c62828">'+mtg.old+'</strong></span></div><div class="mtg-wk">';
    for(let w=1;w<=5;w++){const wk=mtg.wk.find(x=>x.w===w);if(wk){const ir=wk.tp==='現行版';h+='<div class="mtg-card '+(ir?'rec':'old')+'"><div class="mtg-wn">'+w+'回目（'+wk.d+'）</div><div class="mtg-who">'+wk.who+'</div><div class="mtg-tp"><span class="badge '+(ir?'b-rec':'b-ng')+'">'+wk.tp+'</span></div></div>';}else h+='<div class="mtg-card none"><div class="mtg-wn">'+w+'回目</div><div class="mtg-who" style="color:#ccc">未実施</div></div>';}h+='</div></div>';}
  if(nps){
    const rr=Math.round(nps.rr*1000)/10,hr=nps.hr!=null?Math.round(nps.hr*1000)/10:0;
    let lri=LS.findIndex(s=>nps.sc>=s);if(lri===-1)lri=LS.length-1;let lci=LR.findIndex(r=>nps.rr>=r);if(lci===-1)lci=LR.length-1;
    const bp=LP[lri]?.[lci]??0;const hm=nps.hr<.05?1:nps.hr<.06?.8:nps.hr<.07?.7:nps.hr<.08?.6:nps.hr<.09?.5:nps.hr<.10?.4:.3;const fp=Math.round(bp*hm);
    h+='<div class="card"><div class="ct">NPS成果評価 ─ '+fS+'（'+ND+'日時点）</div><div class="dg3"><div class="dc" style="background:#e3f2fd"><div class="dl">NPS得点</div><div class="dv" style="color:#1565c0">'+nps.pt+'</div></div><div class="dc" style="background:#e8f5e9"><div class="dl">スコア</div><div class="dv" style="color:#2e7d32">'+nps.sc+'</div></div><div class="dc" style="background:#fff3e0"><div class="dl">回答率</div><div class="dv" style="color:#e65100">'+rr+'%</div></div></div>';
    h+='<div class="sg4">';[['店長ログイン率',nps.li>=1?'100%':Math.round((nps.li||0)*100)+'%',nps.li>=.8?'ok':'w'],['FBコール率',nps.fb>=1?'100%':Math.round((nps.fb||0)*100)+'%',nps.fb>=.8?'ok':'w'],['MTG実施率',nps.mt>=1?'100%':Math.round((nps.mt||0)*100)+'%',nps.mt>=1?'ok':'ng'],['高得点誘導率',hr+'%',nps.hr<.05?'ok':nps.hr<.08?'w':'ng']].forEach(([l,v,t])=>{h+='<div class="sbox"><div class="sl">'+l+'</div><div class="sv">'+v+'</div><div style="margin-top:4px"><span class="badge b-'+t+'">'+(t==='ok'?'達成':t==='w'?'注意':'未達')+'</span></div></div>';});h+='</div>';
    h+='<div style="font-size:13px;font-weight:700;color:#1a237e;margin-bottom:8px">クロスラダー</div><div class="ldr"><table><thead><tr><th>スコア＼回答率</th>';LR.forEach((r,ci)=>{h+='<th'+(ci===lci?' class="hl"':'')+'>'+Math.round(r*1000)/10+'%</th>';});h+='</tr></thead><tbody>';LS.forEach((sc,ri)=>{h+='<tr><td'+(ri===lri?' class="hl"':'')+'>'+sc+'</td>';LP[ri].forEach((pt,ci)=>{h+='<td'+(ri===lri&&ci===lci?' class="hl"':'')+'>'+pt+'</td>';});h+='</tr>';});h+='</tbody></table></div>';
    h+='<div class="lr"><strong>自動計算:</strong> スコア'+nps.sc+' → '+LS[lri]+'以上 / 回答率'+rr+'% → '+Math.round(LR[lci]*100)+'%以上 → 基礎点<strong>'+bp+'pt</strong>';
    if(nps.hr>=.05)h+=' <span style="color:#c62828">× 高得点誘導'+hr+'% → ×'+hm+' → <strong>'+fp+'pt</strong></span>';else h+=' <span style="color:#2e7d32">（減算なし）→ <strong>'+fp+'pt</strong></span>';h+='</div></div>';}
  if(iss){const ir=iss.resp>0?Math.round(iss.iss/iss.resp*1000)/10:0;const mx=Math.max(...iss.c,1);const irp=isp&&isp.resp>0?Math.round(isp.iss/isp.resp*1000)/10:null;const df=irp!=null?Math.round((ir-irp)*10)/10:null;const dh=df!=null?(df>0?'<span class="delta up">▲'+df+'</span>':df<0?'<span class="delta dn">▼'+Math.abs(df)+'</span>':'<span class="delta">→</span>'):'';
    h+='<div class="card"><div class="ct">指摘改善サマリ ─ '+fS+'（当月）</div><div style="display:flex;gap:20px;margin-bottom:14px"><div><span style="font-size:11px;color:#666">総回答数</span><div style="font-size:22px;font-weight:700;color:#1a237e">'+iss.resp+'</div></div><div><span style="font-size:11px;color:#666">指摘件数</span><div style="font-size:22px;font-weight:700;color:#c62828">'+iss.iss+'</div></div><div><span style="font-size:11px;color:#666">指摘改善率</span><div style="font-size:22px;font-weight:700">'+ir+'% '+dh+'</div></div>';
    if(isp)h+='<div><span style="font-size:11px;color:#666">前月</span><div style="font-size:22px;font-weight:700;color:#888">'+irp+'%</div></div>';h+='</div>';
    CF.forEach((c,i)=>{const v=iss.c[i]||0;const pv=isp?isp.c[i]||0:0;const d=v-pv;const dd=d>0?'<span class="delta up">+'+d+'</span>':d<0?'<span class="delta dn">'+d+'</span>':'';h+='<div class="br"><span class="br-l">'+c+'</span><div class="br-bg"><div class="br-f" style="width:'+Math.round(v/mx*100)+'%;background:'+CL[i]+'"></div></div><span class="br-n">'+v+' '+dd+'</span></div>';});
    const ti=iss.c.indexOf(Math.max(...iss.c));if(iss.c[ti]>0)h+='<div style="margin-top:12px;padding:12px;background:#fff3e0;border-radius:8px;font-size:12px;border:1px solid #ffe0b2"><strong>最重要改善項目:</strong> '+CF[ti]+'（'+iss.c[ti]+'件）</div>';h+='</div>';}
  document.getElementById('detail').innerHTML=h;
}

function dC(id){if(ch[id]){ch[id].destroy();delete ch[id];}}
function bo(o){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{max:o.max,ticks:{font:{size:10},callback:v=>o.sfx?v+o.sfx:v}}}};}
init();

</script>
</body>
</html>
